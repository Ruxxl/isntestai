<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISN Test — Генератор тест-кейсов</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f5;
    --text2: #8888a0;
    --text3: #55556a;
    --accent: #6c63ff;
    --accent2: #4f46e5;
    --glass: rgba(255,255,255,0.03);
  }

  body {
    background: var(---bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    line-height: 1.6;
    overflow-x: hidden;
  }

  .container {
    max-width: 1200px;
    margin: 40px auto;
    padding: 0 24px;
  }

  header {
    margin-bottom: 48px;
    text-align: center;
  }

  h1 {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: -2px;
    margin-bottom: 12px;
    background: linear-gradient(90deg, #fff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .grid {
    display: grid;
    grid-template-columns: 400px 1fr;
    gap: 32px;
    align-items: start;
  }

  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border2), transparent);
  }

  label {
    display: block;
    font-weight: 600;
    font-size: 0.9rem;
    margin-bottom: 10px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  textarea, input, select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    transition: all 0.3s;
    margin-bottom: 20px;
  }

  textarea:focus, input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.15);
  }

  .config-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .checkbox-group {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
  }

  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-size: 0.9rem;
  }

  .checkbox-item input {
    width: auto;
    margin: 0;
  }

  button {
    width: 100%;
    background: var(--accent);
    color: white;
    border: none;
    padding: 18px;
    border-radius: 16px;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  button:hover {
    background: var(--accent2);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(108, 99, 255, 0.3);
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .test-case {
    background: var(--bg3);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid var(--border);
    transition: transform 0.3s;
  }

  .test-case:hover {
    transform: scale(1.01);
    border-color: var(--border2);
  }

  .tc-head {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .badge {
    padding: 4px 12px;
    border-radius: 8px;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
  }

  .badge-high { background: rgba(255, 71, 87, 0.2); color: #ff4757; }
  .badge-medium { background: rgba(255, 165, 2, 0.2); color: #ffa502; }
  .badge-low { background: rgba(46, 213, 115, 0.2); color: #2ed573; }

  .steps {
    list-style: none;
    margin: 12px 0;
    padding-left: 0;
  }

  .steps li {
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
    color: var(--text2);
  }

  .steps li::before {
    content: '→';
    margin-right: 10px;
    color: var(--accent);
  }

  .actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--border2);
    padding: 10px 20px;
    font-size: 0.85rem;
  }

  .loading {
    display: none;
    text-align: center;
    padding: 40px;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--glass);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-msg {
    color: #ff4757;
    background: rgba(255, 71, 87, 0.1);
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 20px;
    display: none;
    font-size: 0.9rem;
  }
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>ISN Test Case AI</h1>
    <p style="color: var(--text2)">Умная генерация тестовой документации на основе требований</p>
  </header>

  <div class="grid">
    <div class="card">
      <div id="error" class="error-msg"></div>
      
      <label>Источник требований</label>
      <div class="config-row">
         <input type="text" id="confUrl" placeholder="Confluence URL">
         <input type="text" id="confPageId" placeholder="Page ID">
      </div>
      <button class="btn-outline" style="margin-bottom: 24px;" onclick="fetchConfluence()">
        <i class="ti ti-brand-confluence"></i> Загрузить из Confluence
      </button>

      <label>Текст требований</label>
      <textarea id="requirements" rows="10" placeholder="Вставьте текст задачи или описание фичи..."></textarea>

      <div class="config-row">
        <div>
          <label>Язык</label>
          <select id="lang">
            <option value="ru">Русский</option>
            <option value="en">English</option>
          </select>
        </div>
        <div>
          <label>Кейсов (max)</label>
          <input type="number" id="maxCases" value="10" min="1" max="30">
        </div>
      </div>

      <label>Формат</label>
      <select id="format">
        <option value="standard">Стандартный (ID, Step, Result)</option>
        <option value="gherkin">Gherkin (Given, When, Then)</option>
        <option value="checklist">Чек-лист</option>
      </select>

      <div class="checkbox-group">
        <label class="checkbox-item">
          <input type="checkbox" id="negative" checked> Негативные
        </label>
        <label class="checkbox-item">
          <input type="checkbox" id="boundary" checked> Граничные
        </label>
      </div>

      <button id="genBtn" onclick="generateTests()">
        <i class="ti ti-sparkles"></i> Сгенерировать тесты
      </button>
    </div>

    <div id="resultsCol">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Нейросеть проектирует сценарии...</p>
      </div>

      <div id="emptyState" style="text-align: center; padding: 100px 0; color: var(--text3);">
        <i class="ti ti-microscope" style="font-size: 4rem; display: block; margin-bottom: 16px;"></i>
        <p>Результаты появятся здесь</p>
      </div>

      <div id="resultsWrapper" style="display: none;">
        <div class="results-header">
          <h2 id="tcCount">Тест-кейсы</h2>
          <div style="display: flex; gap: 8px;">
            <button class="btn-outline" onclick="copyAll()"><i class="ti ti-copy"></i></button>
            <button class="btn-outline" onclick="exportCSV()"><i class="ti ti-file-type-csv"></i></button>
          </div>
        </div>
        <div id="testCaseList"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ==========================================
// КОНФИГУРАЦИЯ ПРОКСИ И БОТА
// ==========================================
const PROXY_URL = 'https://cors-proxy-ccip.onrender.com/proxy';

let testCases = [];

function showError(msg) {
  const err = document.getElementById('error');
  err.innerText = msg;
  err.style.display = 'block';
  setTimeout(() => err.style.display = 'none', 5000);
}

function showLoading(show) {
  document.getElementById('loading').style.display = show ? 'block' : 'none';
  document.getElementById('emptyState').style.display = show ? 'none' : (testCases.length ? 'none' : 'block');
  document.getElementById('genBtn').disabled = show;
  if (show) document.getElementById('resultsWrapper').style.display = 'none';
}

// ГЕНЕРАЦИЯ ЧЕРЕЗ ПРОКСИ
async function generateTests() {
  const reqs = document.getElementById('requirements').value;
  if (!reqs) return showError('Введите текст требований');

  showLoading(true);
  
  try {
    // Формируем URL: наш_прокси?url=адрес_бота
    const finalUrl = `${PROXY_URL}?url=${encodeURIComponent()}`;

    const response = await fetch(finalUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        requirements: reqs,
        config: {
          lang: document.getElementById('lang').value,
          format: document.getElementById('format').value,
          maxCases: parseInt(document.getElementById('maxCases').value),
          negative: document.getElementById('negative').checked,
          boundary: document.getElementById('boundary').checked
        }
      })
    });

    if (!response.ok) throw new Error('Бот вернул ошибку или прокси недоступен');
    
    testCases = await response.json();
    renderTestCases(testCases);
  } catch (e) {
    showError('Ошибка генерации: ' + e.message);
  } finally {
    showLoading(false);
  }
}

// ЗАГРУЗКА ИЗ CONFLUENCE ЧЕРЕЗ ПРОКСИ
async function fetchConfluence() {
  const url = document.getElementById('confUrl').value.trim();
  const pageId = document.getElementById('confPageId').value.trim();

  if (!url || !pageId) return showError('Введите URL и ID страницы Confluence');

  try {
    const confluenceApiUrl = `${url}/rest/api/content/${pageId}?expand=body.storage`;
    const finalUrl = `${PROXY_URL}?url=${encodeURIComponent(confluenceApiUrl)}`;

    const response = await fetch(finalUrl);
    if (!response.ok) throw new Error('Не удалось получить данные из Confluence');

    const data = await response.json();
    const rawHtml = data.body.storage.value;
    
    // Очистка от HTML тегов
    const temp = document.createElement('div');
    temp.innerHTML = rawHtml;
    document.getElementById('requirements').value = temp.innerText || temp.textContent;
    
    showError('✅ Требования импортированы!');
  } catch (e) {
    showError('Ошибка Confluence: ' + e.message);
  }
}

function renderTestCases(cases) {
  const list = document.getElementById('testCaseList');
  list.innerHTML = '';
  document.getElementById('resultsWrapper').style.display = 'block';
  document.getElementById('tcCount').innerText = `Сгенерировано: ${cases.length}`;

  cases.forEach(tc => {
    const card = document.createElement('div');
    card.className = 'test-case';
    card.innerHTML = `
      <div class="tc-head">
        <strong style="color: var(--accent)">${tc.id || 'TC'}</strong>
        <span class="badge badge-${(tc.priority || 'medium').toLowerCase()}">${tc.priority || 'Medium'}</span>
      </div>
      <h3 style="margin-bottom: 12px; font-size: 1.1rem;">${tc.name}</h3>
      <p style="font-size: 0.85rem; color: var(--text3); margin-bottom: 8px;">
        <strong>Предусловия:</strong> ${tc.preconditions || 'нет'}
      </p>
      <ul class="steps">
        ${(tc.steps || []).map(step => `<li>${step}</li>`).join('')}
      </ul>
      <div style="margin-top: 12px; padding: 12px; background: var(--glass); border-radius: 10px; font-size: 0.9rem;">
        <strong style="color: #2ed573">Ожидаемый результат:</strong><br>${tc.expected}
      </div>
    `;
    list.appendChild(card);
  });
}

// ЭКСПОРТ И КОПИРОВАНИЕ
function download(filename, text, type) {
  const element = document.createElement('a');
  element.setAttribute('href', `data:${type};charset=utf-8,` + encodeURIComponent(text));
  element.setAttribute('download', filename);
  element.style.display = 'none';
  document.body.appendChild(element);
  element.click();
  document.body.removeChild(element);
}

function exportCSV() {
  if (!testCases.length) return;
  const rows = [['ID','Name','Priority','Preconditions','Steps','Expected Result']];
  testCases.forEach(tc => rows.push([
    tc.id, tc.name, tc.priority, tc.preconditions, (tc.steps || []).join(' | '), tc.expected
  ]));
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  download('test-cases.csv', csv, 'text/csv');
}

function copyAll() {
  const text = testCases.map(tc => 
    `${tc.id}: ${tc.name}\nSteps:\n${(tc.steps||[]).map((s,i)=>`${i+1}. ${s}`).join('\n')}\nResult: ${tc.expected}`
  ).join('\n\n---\n\n');
  navigator.clipboard.writeText(text).then(() => alert('Скопировано в буфер обмена'));
}
</script>

</body>
</html>
